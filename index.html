function ensureToday(){const t=today();if(!daily[t])daily[t]={q:0,c:0,sec:{}};return daily[t]}
function saveAll(){LS.set('prog',prog);LS.set('daily',daily);LS.set('wrongs',wrongs)}
function recordAnswer(sec,ok,qData){
  const d=ensureToday();d.q++;if(ok)d.c++;
  if(!d.sec[sec])d.sec[sec]={q:0,c:0};d.sec[sec].q++;if(ok)d.sec[sec].c++;
  // Track wrong words
  if(!ok && qData){
    const key = qData.stem.replace(/<[^>]+>/g,'').substring(0,60);
    if(!wrongs[key])wrongs[key]={count:0,correct:qData.options[qData.answer],type:qData.subtype||''};
    wrongs[key].count++;
  }
  saveAll();
}
function getStreak(){let s=0;const d=new Date();while(true){const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(daily[k]&&daily[k].q>0){s++;d.setDate(d.getDate()-1)}else break}return s}
function secStats(sec){let t=0,c=0;Object.values(daily).forEach(d=>{if(d.sec&&d.sec[sec]){t+=d.sec[sec].q;c+=d.sec[sec].c}});return{t,c,p:t?Math.round(c/t*100):0}}
function totalStats(){let t=0,c=0;Object.values(daily).forEach(d=>{t+=d.q;c+=d.c});return{t,c,p:t?Math.round(c/t*100):0,days:Object.keys(daily).filter(k=>daily[k].q>0).length}}

function getQPool(){
  if(qFilter==='all')return D.questions;
  if(qFilter==='grammar')return D.questions.filter(q=>['conjunction','tense','preposition','sentence_completion','conjunction_gen','tense_gen','sentence_comp_gen'].includes(q.subtype));
  if(qFilter==='hedef')return D.questions.filter(q=>['hedef_fill','synonym','tr2en_word','hedef_colloc'].includes(q.subtype));
  if(qFilter==='w2000'){
    if(qDir==='en2tr')return D.questions.filter(q=>q.subtype==='word_2000');
    if(qDir==='tr2en')return D.questions.filter(q=>q.subtype==='word_2000_rev');
    return D.questions.filter(q=>['word_2000','word_2000_rev'].includes(q.subtype));
  }
  if(qFilter==='pv')return D.questions.filter(q=>['phrasal_verb','phrasal_verb_rev','phrasal_verb_sent'].includes(q.subtype));
  if(qFilter==='prep')return D.questions.filter(q=>['preposition_quiz','preposition_quiz_rev','preposition_sent'].includes(q.subtype));
  if(qFilter==='vocab')return D.questions.filter(q=>['vocabulary','vocab_group','word_def'].includes(q.subtype));
  if(qFilter==='translation')return D.questions.filter(q=>q.type==='translation'||['en2tr_gen'].includes(q.subtype));
  return D.questions;
}
function startQ(pool,sec){if(!pool.length)return;const sh=[...pool].sort(()=>Math.random()-.5);qs={q:sh[0],sec,done:false};qa=null}
function ansQ(i){if(!qs||qs.done)return;const ok=i===qs.q.answer;qa={sel:i,ok};qs.done=true;recordAnswer(qs.sec,ok,qs.q);render()}
function nextQ(pool,sec){startQ(pool,sec);render()}

function heatmapHTML(){
  const days=[];const d=new Date();
  for(let i=0;i<91;i++){const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');const dd=daily[k];const q=dd?dd.q:0;let lvl=0;if(q>=1)lvl=1;if(q>=5)lvl=2;if(q>=15)lvl=3;if(q>=25)lvl=4;if(q>=40)lvl=5;days.push({k,q,lvl,dow:d.getDay()});d.setDate(d.getDate()-1)}
  days.reverse();const weeks=[];let wk=[];days.forEach((day,i)=>{wk.push(day);if(day.dow===6||i===days.length-1){weeks.push(wk);wk=[]}});if(wk.length)weeks.push(wk);
  let h='<div class="heatmap">';weeks.forEach(w=>{h+='<div class="hm-week">';w.forEach(d=>{h+=`<div class="hm-day" data-lvl="${d.lvl}" title="${d.k}: ${d.q} soru"></div>`});h+='</div>'});
  h+='</div><div class="hm-legend"><span>Az</span>';for(let i=0;i<=5;i++)h+=`<div class="hm-day" data-lvl="${i}"></div>`;h+='<span>Çok</span></div>';return h
}

function donutSVG(segments,size=100,stroke=10){
  const r=(size-stroke)/2,circ=2*Math.PI*r;
  let offset=0,paths='';
  segments.forEach(s=>{
    const len=(s.pct/100)*circ;
    paths+=`<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${stroke}" stroke-dasharray="${len} ${circ-len}" stroke-dashoffset="${-offset}" stroke-linecap="round" style="transition:.5s"/>`;
    offset+=len;
  });
  return`<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="transform:rotate(-90deg)">`+
    `<circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--s2)" stroke-width="${stroke}"/>`+paths+`</svg>`;
}

    ];
    const donutSegs=catData.filter(c=>c.s.t>0).map(c=>({pct:Math.max(c.s.p*(c.s.t/Math.max(ts.t,1)),2),color:c.col}));
    if(!donutSegs.length)donutSegs.push({pct:100,color:'var(--s2)'});
    const totalPct=ts.t?ts.p:0;

    body=`
      <div class="grid-4">
        <div class="stat-card"><b style="color:var(--yel)">${streak}🔥</b><span>Gün Seri</span></div>
        <div class="stat-card"><b style="color:var(--ac)">${td.q}</b><span>Bugün</span></div>
        <div class="stat-card"><b style="color:var(--green)">${td.c}</b><span>Doğru</span></div>
        <div class="stat-card"><b style="color:var(--purple)">${td.q?Math.round(td.c/td.q*100):0}%</b><span>Başarı</span></div>
      </div>

      <div class="card" style="margin-top:12px">
          <div class="card-t">📊 Kategori Başarı Oranları</div>
          <div class="donut-wrap">
            <div style="position:relative;width:120px;height:120px;flex-shrink:0">
              ${donutSVG(donutSegs,120,10)}
              <div class="donut-center"><b>${totalPct}%</b><span>genel</span></div>
            </div>
            <div class="donut-legend">
              ${catData.map(c=>`<div><i style="background:${c.col}"></i>${c.n}: <b style="color:${c.col}">${c.s.p}%</b> <span style="color:var(--tx3)">(${c.s.c}/${c.s.t})</span></div>`).join('')}
            </div>
          </div>
      </div>

      <div class="card-t" style="margin-top:16px">📖 Çalışma Modülleri</div>
      <div class="grid-3">
        ${[
          {v:'practice',i:'🎯',t:'Soru Çöz',d:cn.all+' soru',b:'badge-ac'},
          {v:'grammar',i:'📝',t:'Gramer',d:cn.grammar+' soru',b:'badge-red'},
          {v:'hedef',i:'🎓',t:'HEDEF Kelime',d:D.hedef_words.length+' kelime',b:'badge-purple'},
          {v:'vocab',i:'📚',t:'Kelime Grupları',d:cn.vocab+' soru',b:'badge-yel'},
          {v:'prep',i:'🔤',t:'Preposition',d:cn.prep+' soru',b:'badge-blue'},
          {v:'phrasal',i:'🔗',t:'Phrasal Verb',d:cn.pv+' soru',b:'badge-purple'},
        ].map(m=>`<div class="mod-card" onclick="view='${m.v}';subView='list';qs=null;render()"><div class="ico">${m.i}</div><h3>${m.t}</h3><p>${m.d}</p><span class="badge ${m.b}">${m.d}</span></div>`).join('')}
      </div>`;
  }

  // ===== PRACTICE =====
  else if(view==='practice'){
    title='Soru Çöz';
    if(subView==='list'||!qs){
      body=`<div class="card"><div class="card-t">🎯 Soru Bankası — ${cn.all} Soru</div>
        <div class="chips">
          ${[['all','Tümü',cn.all],['grammar','Gramer',cn.grammar],['hedef','HEDEF',cn.hedef],['w2000','2000 Kelime',cn.w2000],['pv','Phrasal Verb',cn.pv],['prep','Preposition',cn.prep],['vocab','Kelime',cn.vocab],['translation','Çeviri',cn.translation]].map(([k,n,c])=>`<button class="chip ${qFilter===k?'on':''}" onclick="qFilter='${k}';qDir='both';startQ(getQPool(),'${k}');subView=null;render()">${n} (${c})</button>`).join('')}
        </div>
        ${qFilter==='w2000'?`<div class="chips" style="margin-top:4px">
          <button class="chip ${qDir==='both'?'on':''}" onclick="qDir='both';startQ(getQPool(),'w2000');subView=null;render()">🔄 Her İki Yön (${cn.w2000})</button>
          <button class="chip ${qDir==='en2tr'?'on':''}" onclick="qDir='en2tr';startQ(getQPool(),'w2000');subView=null;render()">🇬🇧→🇹🇷 EN→TR (${D.questions.filter(q=>q.subtype==='word_2000').length})</button>
          <button class="chip ${qDir==='tr2en'?'on':''}" onclick="qDir='tr2en';startQ(getQPool(),'w2000');subView=null;render()">🇹🇷→🇬🇧 TR→EN (${D.questions.filter(q=>q.subtype==='word_2000_rev').length})</button>
        </div>`:''}
        </div>
        <div style="text-align:center;padding:40px;color:var(--tx3)">Yukarıdan kategori seç ve çözmeye başla</div>`;
    }else{
      const q=qs.q;
      body=`<button class="back-btn" onclick="subView='list';qs=null;render()">← Geri</button>
        <div style="display:flex;justify-content:space-between;margin-bottom:10px">
          <span class="exam-tag">${q.year||''}</span>
          <span style="font-size:11px;color:var(--tx3)">${q.subtype||q.type}</span>
        </div>
        <div class="quiz-card">
          <div class="quiz-stem">${q.stem}</div>
          <div class="quiz-opts">${q.options.map((o,i)=>{let cls='qo';if(qs.done){cls+=' done';if(i===q.answer)cls+=' ok';else if(qa&&i===qa.sel&&!qa.ok)cls+=' no'}return`<button class="${cls}" onclick="ansQ(${i})">${String.fromCharCode(65+i)}) ${o}</button>`}).join('')}</div>
          ${qs.done?`<div class="explanation">💡 ${q.explanation||''}</div>
            <div style="text-align:center;margin-top:16px"><button class="btn btn-ac" onclick="nextQ(getQPool(),qs.sec)">Sonraki Soru →</button></div>`:''}
        </div>`;
    }
  }

  // ===== GRAMMAR =====
  else if(view==='grammar'){
    title='Gramer Kuralları';
    if(subView==='detail'&&subId){
      const rule=D.grammar_rules.find(r=>r.id===subId);
      if(!rule){subView='list';render();return}
      const relQ=D.questions.filter(q=>q.rule===rule.id);
      body=`<button class="back-btn" onclick="subView='list';subId=null;render()">← Kurallar</button>
        <div class="card"><h3 style="font-family:var(--font-head);font-size:18px;margin-bottom:6px">${rule.title}</h3>
          <p style="font-size:14px;color:var(--tx2);line-height:1.7;margin:10px 0">${rule.desc}</p>
          <div class="pattern-box">${rule.pattern}</div><span class="exam-tag" style="margin-left:8px">Sınavda ${rule.examCount}+ kez</span>
          <div style="margin-top:16px"><div style="font-size:12px;font-weight:600;color:var(--tx2);margin-bottom:8px">GERÇEK SINAV ÖRNEKLERİ</div>
            ${rule.examples.map(ex=>`<div style="background:var(--s2);border-radius:var(--rs);padding:12px 16px;margin-bottom:6px;font-size:13px;color:var(--tx2);line-height:1.7;font-style:italic;border-left:2px solid var(--ac)">${ex}</div>`).join('')}
          </div></div>
        ${relQ.length?`<div class="card-t" style="margin-top:8px">🎯 İlgili Sorular (${relQ.length})</div>
          ${relQ.map(q=>`<div class="quiz-card" style="margin-bottom:8px"><span class="exam-tag">${q.year}</span>
            <div class="quiz-stem" style="margin-top:8px">${q.stem}</div>
            <button class="btn btn-ac btn-sm" onclick="startQ([D.questions[${D.questions.indexOf(q)}]],'grammar');view='practice';subView=null;render()">Çöz</button></div>`).join('')}`:''}`;
    }else{
      body=`<div class="card"><p style="font-size:13px;color:var(--tx2)">${D.grammar_rules.length} kural — 2013-2024 YDS/YÖKDİL'den derlendi</p></div>
        ${D.grammar_rules.map(r=>`<div class="rule-card" onclick="subView='detail';subId='${r.id}';render()">
          <div style="display:flex;justify-content:space-between"><h4>${r.title}</h4><span class="exam-tag">${r.examCount}+</span></div>
          <p>${r.desc.substring(0,100)}${r.desc.length>100?'...':''}</p><div class="pattern-box" style="margin-top:6px">${r.pattern}</div></div>`).join('')}`;
    }
  }

  // ===== HEDEF =====
  else if(view==='hedef'){
    title='HEDEF Kelimeler';
    if(subView==='quiz'){
      if(!qs){const hq=D.hedef_words.map((w,i)=>({id:'h'+i,type:'hedef',subtype:w.cat,year:'HEDEF '+w.cat,stem:`<b style="font-size:22px">${w.en}</b><br><span style="font-size:12px;color:var(--tx3)">Eşanlamlı: ${w.synonyms||'-'}</span>`,options:w.options,answer:w.answer,explanation:w.en+' = '+w.tr+(w.synonyms?' ('+w.synonyms+')':'')}));startQ(hq,'hedef')}
      if(qs){const q=qs.q;
        body=`<button class="back-btn" onclick="subView=null;qs=null;render()">← Geri</button>
          <div class="quiz-card"><div style="margin-bottom:8px"><span class="badge badge-purple">${q.year}</span></div>
            <div class="quiz-stem">${q.stem}</div>
            <div class="quiz-opts">${q.options.map((o,i)=>{let cls='qo';if(qs.done){cls+=' done';if(i===q.answer)cls+=' ok';else if(qa&&i===qa.sel&&!qa.ok)cls+=' no'}return`<button class="${cls}" onclick="ansQ(${i})">${o}</button>`}).join('')}</div>
            ${qs.done?`<div class="explanation">💡 ${q.explanation}</div><div style="text-align:center;margin-top:14px"><button class="btn btn-ac" onclick="const hq=D.hedef_words.map((w,i)=>({id:'h'+i,type:'hedef',subtype:w.cat,year:'HEDEF '+w.cat,stem:'<b style=font-size:22px>'+w.en+'</b><br><span style=font-size:12px;color:var(--tx3)>Eşanlamlı: '+(w.synonyms||'-')+'</span>',options:w.options,answer:w.answer,explanation:w.en+' = '+w.tr}));nextQ(hq,'hedef')">Sonraki →</button></div>`:''}
          </div>`}
    }else{
      body=`<div class="card"><p style="font-size:13px;color:var(--tx2);margin-bottom:12px">${D.hedef_words.length} kelime — Aykut Hoca ders notlarından</p>
        <button class="btn btn-ac" onclick="subView='quiz';qs=null;render()">Quiz Başlat</button></div>
        <div class="chips"><button class="chip on" onclick="subId=null;render()">Tümü</button>
          <button class="chip" onclick="subId='Sıfat';render()">Sıfatlar (${D.hedef_words.filter(w=>w.cat==='Sıfat').length})</button>
          <button class="chip" onclick="subId='Fiil';render()">Fiiller (${D.hedef_words.filter(w=>w.cat==='Fiil').length})</button></div>
        ${(subId?D.hedef_words.filter(w=>w.cat===subId):D.hedef_words).map(w=>`<div class="list-item"><b>${w.en}</b><span style="color:var(--tx2);flex:1;font-size:12px">${w.tr}</span><span class="badge badge-purple" style="margin:0">${w.cat}</span></div>`).join('')}`;
    }
  }

  // ===== VOCAB =====
  else if(view==='vocab'){
    title='Kelime';
    const w2kEN=D.questions.filter(q=>q.subtype==='word_2000').length;
    const w2kTR=D.questions.filter(q=>q.subtype==='word_2000_rev').length;
    if(subView==='quiz'){
      if(!qs){
        const pool=qDir==='en2tr'?D.questions.filter(q=>q.subtype==='word_2000'):qDir==='tr2en'?D.questions.filter(q=>q.subtype==='word_2000_rev'):D.questions.filter(q=>['word_2000','word_2000_rev'].includes(q.subtype));
        startQ(pool,'w2000');
      }
      if(qs){const q=qs.q;
        body=`<button class="back-btn" onclick="subView=null;qs=null;render()">← Kelime</button>
          <div style="display:flex;gap:6px;margin-bottom:12px">
            <button class="chip ${qDir==='both'?'on':''}" onclick="qDir='both';qs=null;subView='quiz';render()">🔄 Karışık</button>
            <button class="chip ${qDir==='en2tr'?'on':''}" onclick="qDir='en2tr';qs=null;subView='quiz';render()">🇬🇧→🇹🇷 EN→TR</button>
            <button class="chip ${qDir==='tr2en'?'on':''}" onclick="qDir='tr2en';qs=null;subView='quiz';render()">🇹🇷→🇬🇧 TR→EN</button>
          </div>
          <div class="quiz-card"><div style="margin-bottom:8px"><span class="badge badge-yel">${qDir==='en2tr'?'EN→TR':qDir==='tr2en'?'TR→EN':'Karışık'}</span></div>
            <div class="quiz-stem">${q.stem}</div>
            <div class="quiz-opts">${q.options.map((o,i)=>{let cls='qo';if(qs.done){cls+=' done';if(i===q.answer)cls+=' ok';else if(qa&&i===qa.sel&&!qa.ok)cls+=' no'}return`<button class="${cls}" onclick="ansQ(${i})">${o}</button>`}).join('')}</div>
            ${qs.done?`<div class="explanation">💡 ${q.explanation}</div><div style="text-align:center;margin-top:14px"><button class="btn btn-ac" onclick="qs=null;subView='quiz';render()">Sonraki →</button></div>`:''}
          </div>`}
    }else if(subView==='detail'&&subId){
      const grp=D.vocab_groups.find(g=>g.id===subId);
      body=`<button class="back-btn" onclick="subView=null;subId=null;render()">← Kelime</button>
        <div class="card"><div class="card-t">📚 ${grp.title}</div>
          ${grp.words.map(w=>`<div class="list-item"><b>${w.en}</b><span style="color:var(--tx2);flex:1;font-size:12px">${w.tr}</span></div>`).join('')}</div>`;
    }else{
      body=`
        <div class="card">
          <div class="card-t">🎯 2000 Kelime Quiz</div>
          <p style="font-size:13px;color:var(--tx2);margin-bottom:14px">Yön seçerek kelime quizine başla</p>
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            <button class="btn btn-ac" onclick="qDir='both';subView='quiz';qs=null;render()">🔄 Karışık (${w2kEN+w2kTR})</button>
            <button class="btn btn-ghost" onclick="qDir='en2tr';subView='quiz';qs=null;render()">🇬🇧→🇹🇷 İngilizce → Türkçe (${w2kEN})</button>
            <button class="btn btn-ghost" onclick="qDir='tr2en';subView='quiz';qs=null;render()">🇹🇷→🇬🇧 Türkçe → İngilizce (${w2kTR})</button>
          </div>
        </div>
        <div class="card-t" style="margin-top:8px">📚 Tematik Kelime Grupları</div>
        ${D.vocab_groups.map(g=>`<div class="rule-card" onclick="subView='detail';subId='${g.id}';render()"><h4>${g.title}</h4><p>${g.words.length} kelime — ${g.words.slice(0,4).map(w=>w.en).join(', ')}...</p></div>`).join('')}`;
    }
  }

  // ===== PREP =====
  else if(view==='prep'){
    title='Preposition Phrases';
    body=`${D.prep_groups.map(g=>`<div class="card"><div class="prep-group"><h4>${g.title}</h4>
      ${g.phrases.map(p=>`<div class="list-item"><b>${p.en}</b><span style="color:var(--tx2);flex:1;font-size:12px">${p.tr}</span></div>`).join('')}</div></div>`).join('')}`;
  }

  // ===== PHRASAL =====
  else if(view==='phrasal'){
    title='Phrasal Verbs';
    body=`<div class="card"><p style="font-size:13px;color:var(--tx2)">${D.phrasal_verbs.length} sınavda çıkmış phrasal verb</p></div>
      ${D.phrasal_verbs.map(pv=>`<div class="list-item"><b>${pv.pv}</b><span style="color:var(--tx2);flex:1;font-size:12px">${pv.tr}</span><span style="font-size:10px;color:var(--tx3)">${pv.exam}</span></div>`).join('')}`;
  }

  // ===== WRONG WORDS =====
  else if(view==='wronglist'){
    title='Yanlış Bilinenler';
    const sorted=Object.entries(wrongs).sort((a,b)=>b[1].count-a[1].count);
    body=`<div class="card"><div class="card-t">${IC.x} En Çok Yanlış Yapılan Sorular</div>
      <p style="font-size:13px;color:var(--tx2);margin-bottom:8px">${sorted.length} farklı soru yanlış cevaplanmış. Bu listeye odaklan!</p></div>
      ${sorted.length?sorted.map(([key,val])=>`<div class="wrong-word"><b style="font-size:12px;min-width:auto;flex:2">${key}</b><span style="font-size:11px">Doğru: <b style="color:var(--green)">${val.correct}</b></span><span class="wrong-count">${val.count}x yanlış</span></div>`).join(''):'<div style="text-align:center;padding:40px;color:var(--tx3)">Henüz yanlış yok — harika!</div>'}
      ${sorted.length?`<button class="btn btn-danger btn-sm" style="margin-top:12px" onclick="if(confirm('Yanlış listesi temizlensin mi?')){wrongs={};LS.set('wrongs',wrongs);render()}">Listeyi Temizle</button>`:''}`;
  }

  // ===== PROGRESS =====
  else if(view==='progress'){
    title='İlerleme';
    const goalPct=Math.min(Math.round(td.q/20*100),100);
    const ms=[
      {i:'🌱',t:'İlk Adım',d:'10 soru çöz',tgt:10,cur:ts.t},{i:'📚',t:'Başlangıç',d:'50 soru',tgt:50,cur:ts.t},
      {i:'💪',t:'Azimli',d:'200 soru',tgt:200,cur:ts.t},{i:'⭐',t:'Yarı Yol',d:'500 soru',tgt:500,cur:ts.t},
      {i:'🏆',t:'Uzman',d:'1000 soru',tgt:1000,cur:ts.t},{i:'🔥',t:'7 Gün Seri',d:'1 hafta',tgt:7,cur:streak},
      {i:'🔥',t:'30 Gün',d:'1 ay',tgt:30,cur:streak},
    ];
    body=`
      <div class="grid-2">
        <div class="card">
          <div class="card-t">🔥 Seri</div>
          <div class="streak-box"><div class="streak-fire">${streak>0?'🔥':'💤'}</div><div><div class="streak-num">${streak}</div><div style="font-size:12px;color:var(--tx2);text-align:center">gün üst üste</div></div></div>
        </div>
        <div class="card">
          <div class="card-t">📅 Bugün</div>
          <div class="donut-wrap">
            <div style="position:relative;width:80px;height:80px;flex-shrink:0">
              ${donutSVG([{pct:goalPct,color:'var(--ac)'}],80,7)}
              <div class="donut-center"><b style="font-size:18px">${goalPct}%</b><span>hedef</span></div>
            </div>
            <div style="font-size:13px;color:var(--tx2);line-height:1.8"><b>${td.q}</b>/20 soru<br><b style="color:var(--green)">${td.c}</b> doğru<br><b style="color:var(--purple)">${td.q?Math.round(td.c/td.q*100):0}%</b> başarı</div>
          </div>
        </div>
      </div>
      <div class="card"><div class="card-t">🗓️ Son 90 Gün</div>${heatmapHTML()}</div>
      <div class="grid-2">
        <div class="card"><div class="card-t">📊 Toplam</div>
          <div class="grid-4" style="margin:0">
            <div class="stat-card" style="padding:10px 6px"><b style="font-size:18px;color:var(--ac)">${ts.t}</b><span>Soru</span></div>
            <div class="stat-card" style="padding:10px 6px"><b style="font-size:18px;color:var(--green)">${ts.c}</b><span>Doğru</span></div>
            <div class="stat-card" style="padding:10px 6px"><b style="font-size:18px;color:var(--purple)">${ts.p}%</b><span>Oran</span></div>
            <div class="stat-card" style="padding:10px 6px"><b style="font-size:18px;color:var(--yel)">${ts.days}</b><span>Gün</span></div>
          </div>
        </div>
        <div class="card"><div class="card-t">🏆 Hedefler</div>
          ${ms.map(m=>{const done=m.cur>=m.tgt;const p=Math.min(Math.round(m.cur/m.tgt*100),100);return`<div class="ms-item ${done?'done':'pend'}"><div class="ms-icon">${m.i}</div><div style="flex:1"><b style="font-size:12px">${m.t}</b><span style="font-size:10px;color:var(--tx2);display:block">${m.d} ${done?'✓':m.cur+'/'+m.tgt}</span>${!done?`<div class="ms-bar"><div class="ms-bar-fill" style="width:${p}%"></div></div>`:''}</div></div>`}).join('')}
        </div>
      </div>
      <button class="btn btn-danger btn-sm" style="margin-top:8px" onclick="if(confirm('Sıfırlansın mı?')){prog={};daily={};wrongs={};LS.set('prog',prog);LS.set('daily',daily);LS.set('wrongs',wrongs);render()}">Tüm İlerlemeyi Sıfırla</button>`;
  }

  document.getElementById('root').innerHTML=`
    <div class="layout">
      <div class="sidebar">
        <div class="sidebar-head"><h1>YÖKDİL Hazırlık</h1><p>${D.questions.length} Soru • ${D.hedef_words.length} Kelime</p></div>
        <div class="sidebar-nav">
          ${navItems.map(n=>`<button class="snav ${view===n.id?'on':''}" onclick="view='${n.id}';subView=${n.id==='practice'||n.id==='grammar'||n.id==='vocab'||n.id==='hedef'?"'list'":"null"};qs=null;render()">${n.icon}<span>${n.label}</span>
            ${n.id==='wronglist'?`<span class="badge-n">${Object.keys(wrongs).length}</span>`:''}
            ${n.id==='practice'?`<span class="badge-n">${D.questions.length}</span>`:''}
          </button>`).join('')}
        </div>
        <div class="sidebar-foot">Aykut Hoca Notları Tabanlı</div>
      </div>
      <div class="main">
        <div class="main-head">
          <h2>${title}</h2>
          <div class="stats-mini">
            <div class="mini-st">🔥 <b style="color:var(--yel)">${streak}</b></div>
            <div class="mini-st">Bugün: <b style="color:var(--ac)">${td.q}</b></div>
            <div class="mini-st">Başarı: <b style="color:var(--green)">${td.q?Math.round(td.c/td.q*100):0}%</b></div>
          </div>
        </div>
        <div class="main-body">${body}</div>
      </div>
      <div class="bot-nav">
        ${[['home','Ana',IC.home],['practice','Çöz',IC.quiz],['hedef','HEDEF',IC.star],['grammar','Gramer',IC.book],['wronglist','Yanlış',IC.x],['progress','İlerleme',IC.chart]].map(([id,l,ic])=>
          `<button class="bnav ${view===id?'on':''}" onclick="view='${id}';subView=${['practice','grammar','vocab','hedef'].includes(id)?"'list'":"null"};qs=null;render()">${ic}${l}</button>`
        ).join('')}
      </div>
    </div>`;
}

ensureToday();render();
</script></body></html>
