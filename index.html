<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YÖKDİL Hazırlık Merkezi</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#07090e;--bg2:#0c1017;--s1:#111827;--s2:#1a2236;--s3:#243049;
--brd:#1e293b;--brd2:#334155;
--tx:#f1f5f9;--tx2:#94a3b8;--tx3:#64748b;
--ac:#22d3ee;--ac2:#06b6d4;--acbg:rgba(34,211,238,.08);--acbrd:rgba(34,211,238,.2);
--green:#34d399;--red:#fb7185;--yel:#fbbf24;--blue:#60a5fa;--purple:#a78bfa;--orange:#fb923c;--pink:#f472b6;
--r:16px;--rs:10px;--rr:8px;
--font:'Inter',system-ui,-apple-system,sans-serif;
--font-head:'Space Grotesk','Inter',sans-serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5}

/* ====== LAYOUT ====== */
.layout{display:flex;height:100dvh}

/* SIDEBAR (PC) */
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--brd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-head{padding:24px 20px 16px}
.sidebar-head h1{font-family:var(--font-head);font-size:20px;font-weight:700;letter-spacing:-.3px;
background:linear-gradient(135deg,var(--ac),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-head p{font-size:11px;color:var(--tx3);margin-top:2px}
.sidebar-nav{flex:1;overflow-y:auto;padding:0 10px}
.snav{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rr);color:var(--tx3);cursor:pointer;font-size:13px;font-weight:500;border:none;background:none;width:100%;text-align:left;font-family:inherit;transition:.15s;margin-bottom:2px}
.snav:hover{background:var(--s1);color:var(--tx2)}
.snav.on{background:linear-gradient(135deg,rgba(34,211,238,.1),rgba(167,139,250,.06));color:var(--ac);border:1px solid var(--acbrd)}
.snav svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}
.snav .badge-n{margin-left:auto;background:var(--s2);color:var(--tx3);font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
.snav.on .badge-n{background:rgba(34,211,238,.12);color:var(--ac)}
.sidebar-foot{padding:12px 14px;border-top:1px solid var(--brd);font-size:10px;color:var(--tx3);text-align:center}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.main-head{padding:16px 32px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--bg2)}
.main-head h2{font-family:var(--font-head);font-size:18px;font-weight:700;letter-spacing:-.2px}
.main-head .stats-mini{display:flex;gap:16px}
.mini-st{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tx2)}
.mini-st b{font-weight:700;font-size:15px}
.main-body{flex:1;overflow-y:auto;padding:24px 32px 40px;background:var(--bg)}

/* BOTTOM NAV (mobile) */
.bot-nav{display:none;gap:2px;padding:6px 8px 8px;background:var(--bg2);border-top:1px solid var(--brd);flex-shrink:0}
.bnav{flex:1;padding:7px 2px 5px;border:none;border-radius:var(--rr);background:transparent;color:var(--tx3);font-family:var(--font);font-size:9px;font-weight:500;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.bnav svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}
.bnav.on{color:var(--ac);background:var(--acbg)}

/* RESPONSIVE */
@media(max-width:860px){
  .sidebar{display:none}
  .bot-nav{display:flex}
  .main-head{padding:12px 16px}
  .main-body{padding:16px 16px 24px}
  .grid-2{grid-template-columns:1fr!important}
  .grid-3{grid-template-columns:1fr!important}
  .grid-4{grid-template-columns:1fr 1fr!important}
}

/* ====== COMPONENTS ====== */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}

.card{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);padding:20px;margin-bottom:12px;transition:.15s}
.card-sm{padding:16px}
.card-t{font-family:var(--font-head);font-size:13px;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;gap:8px}

/* STAT CARDS */
.stat-card{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);padding:16px 14px;text-align:center}
.stat-card b{display:block;font-family:var(--font-head);font-size:24px;font-weight:700;line-height:1.2}
.stat-card span{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.8px;margin-top:2px;display:block}

/* MODULE CARDS */
.mod-card{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);padding:18px;cursor:pointer;transition:.2s}
.mod-card:hover{border-color:var(--acbrd);transform:translateY(-1px)}
.mod-card .ico{font-size:28px;margin-bottom:8px}
.mod-card h3{font-family:var(--font-head);font-size:15px;font-weight:600;margin-bottom:3px}
.mod-card p{font-size:12px;color:var(--tx2);line-height:1.4}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;margin-top:8px}
.badge-red{background:rgba(251,113,133,.1);color:var(--red)}
.badge-yel{background:rgba(251,191,36,.1);color:var(--yel)}
.badge-green{background:rgba(52,211,153,.1);color:var(--green)}
.badge-blue{background:rgba(96,165,250,.1);color:var(--blue)}
.badge-purple{background:rgba(167,139,250,.1);color:var(--purple)}
.badge-ac{background:rgba(34,211,238,.1);color:var(--ac)}

/* PROGRESS BARS */
.pbar{height:5px;background:var(--s2);border-radius:3px;overflow:hidden;margin:4px 0}
.pbar-fill{height:100%;border-radius:3px;transition:width .5s ease}

/* BUTTONS */
.btn{padding:10px 22px;border:none;border-radius:var(--rr);font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn:active{transform:scale(.97)}
.btn-ac{background:linear-gradient(135deg,var(--ac2),var(--ac));color:var(--bg);box-shadow:0 2px 12px rgba(34,211,238,.2)}
.btn-ghost{background:var(--s2);color:var(--tx2);border:1px solid var(--brd)}
.btn-sm{padding:7px 14px;font-size:12px}
.btn-danger{background:rgba(251,113,133,.1);color:var(--red);border:1px solid rgba(251,113,133,.15)}

/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.chip{padding:6px 14px;border:1px solid var(--brd);border-radius:20px;background:transparent;color:var(--tx3);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:.15s}
.chip.on{border-color:var(--ac);background:var(--acbg);color:var(--ac)}

/* QUIZ */
.quiz-card{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);padding:24px;margin-bottom:12px}
.quiz-stem{font-size:15px;line-height:1.8;margin-bottom:18px;color:var(--tx)}
.quiz-stem b{color:var(--ac)}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.qo{padding:13px 18px;border:1px solid var(--brd);border-radius:var(--rs);background:var(--s2);color:var(--tx);font-family:var(--font);font-size:14px;cursor:pointer;text-align:left;transition:.2s;line-height:1.5}
.qo:hover:not(.done){border-color:var(--ac);background:rgba(34,211,238,.03)}
.qo.ok{border-color:var(--green);background:rgba(52,211,153,.1);color:var(--green)}
.qo.no{border-color:var(--red);background:rgba(251,113,133,.08);color:var(--red)}
.explanation{background:var(--s2);border-left:3px solid var(--ac);border-radius:0 var(--rs) var(--rs) 0;padding:12px 18px;margin-top:14px;font-size:13px;color:var(--tx2);line-height:1.6}

/* LISTS */
.list-item{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--s1);border:1px solid var(--brd);border-radius:var(--rr);margin-bottom:4px;font-size:13px}
.list-item b{color:var(--ac);min-width:120px;font-weight:600}

/* RULE CARD */
.rule-card{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);padding:16px;margin-bottom:8px;cursor:pointer;transition:.15s}
.rule-card:hover{border-color:var(--acbrd)}
.rule-card h4{font-family:var(--font-head);font-size:15px;font-weight:600;margin-bottom:4px}
.rule-card p{font-size:12px;color:var(--tx2);line-height:1.5}
.pattern-box{display:inline-block;background:var(--s2);border:1px solid var(--brd);border-radius:6px;padding:4px 12px;font-size:12px;color:var(--ac);font-weight:500;font-family:'Space Grotesk',monospace;margin:4px 0}
.exam-tag{display:inline-block;background:rgba(167,139,250,.08);color:var(--purple);font-size:10px;padding:3px 10px;border-radius:8px;font-weight:600}

/* HEATMAP */
.heatmap{display:flex;gap:3px;overflow-x:auto;padding-bottom:4px;direction:rtl}
.heatmap::-webkit-scrollbar{height:0}
.hm-week{display:flex;flex-direction:column;gap:3px;direction:ltr}
.hm-day{width:14px;height:14px;border-radius:3px;background:var(--s2)}
.hm-day[data-lvl="1"]{background:#0e3a3d}.hm-day[data-lvl="2"]{background:#115e5e}.hm-day[data-lvl="3"]{background:#14857a}.hm-day[data-lvl="4"]{background:var(--ac2)}.hm-day[data-lvl="5"]{background:var(--ac)}
.hm-legend{display:flex;align-items:center;justify-content:center;gap:4px;margin-top:8px;font-size:10px;color:var(--tx3)}
.hm-legend .hm-day{width:12px;height:12px}

/* DONUT */
.donut-wrap{display:flex;align-items:center;gap:16px}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut-center b{font-family:var(--font-head);font-size:20px;font-weight:700;color:var(--ac)}
.donut-center span{font-size:9px;color:var(--tx3)}
.donut-legend{font-size:12px;color:var(--tx2);line-height:2}
.donut-legend i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}

/* WRONG WORDS */
.wrong-word{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(251,113,133,.04);border:1px solid rgba(251,113,133,.1);border-radius:var(--rr);margin-bottom:4px;font-size:13px}
.wrong-word b{color:var(--red);min-width:120px}
.wrong-word span{color:var(--tx2);flex:1}
.wrong-count{background:rgba(251,113,133,.12);color:var(--red);font-size:10px;padding:2px 8px;border-radius:8px;font-weight:600;white-space:nowrap}

/* STREAK */
.streak-box{display:flex;align-items:center;gap:14px;justify-content:center;padding:12px 0}
.streak-fire{font-size:40px}
.streak-num{font-family:var(--font-head);font-size:48px;font-weight:800;background:linear-gradient(135deg,var(--yel),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}

/* BACK BTN */
.back-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 0;font-size:13px;color:var(--tx2);cursor:pointer;border:none;background:none;font-family:var(--font);margin-bottom:14px}
.back-btn:hover{color:var(--ac)}

/* SEARCH */
.search{width:100%;padding:11px 16px;border:1px solid var(--brd);border-radius:var(--rs);background:var(--s1);color:var(--tx);font-family:var(--font);font-size:13px;outline:none;margin-bottom:12px}
.search:focus{border-color:var(--ac)}
.search::placeholder{color:var(--tx3)}

/* MS */
.ms-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:var(--rs);margin-bottom:6px}
.ms-item.done{background:rgba(52,211,153,.05);border:1px solid rgba(52,211,153,.1)}
.ms-item.pend{background:var(--s2);opacity:.55;border:1px solid transparent}
.ms-icon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.ms-item.done .ms-icon{background:rgba(52,211,153,.12)}
.ms-item.pend .ms-icon{background:var(--s3)}
.ms-bar{height:3px;background:var(--s3);border-radius:2px;margin-top:5px;overflow:hidden}
.ms-bar-fill{height:100%;background:var(--ac);border-radius:2px}

/* LOGIN */
.login-overlay{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{width:90%;max-width:380px;text-align:center;padding:48px 28px;background:var(--s1);border:1px solid var(--brd);border-radius:var(--r)}
.login-box h2{font-family:var(--font-head);font-size:26px;font-weight:700;background:linear-gradient(135deg,var(--ac),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:12px 0 6px}
.login-box p{font-size:13px;color:var(--tx3);margin-bottom:28px}
.login-input{width:100%;padding:14px 18px;border:1px solid var(--brd);border-radius:var(--rs);background:var(--s2);color:var(--tx);font-family:var(--font);font-size:18px;outline:none;text-align:center;letter-spacing:6px;margin-bottom:16px}
.login-input:focus{border-color:var(--ac)}
.login-input::placeholder{letter-spacing:0;font-size:13px;color:var(--tx3)}
.login-btn{width:100%;padding:14px;border:none;border-radius:var(--rs);background:linear-gradient(135deg,var(--ac2),var(--ac));color:var(--bg);font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer}
.login-err{color:var(--red);font-size:12px;margin-top:10px}
.weak-item{margin-bottom:10px}
.weak-head{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}

/* PREP */
.prep-group h4{font-family:var(--font-head);font-size:14px;font-weight:600;margin-bottom:8px;color:var(--purple)}
</style>
</head>
<body>
<div class="login-overlay" id="loginOverlay">
<div class="login-box"><div style="font-size:52px;margin-bottom:4px">🎓</div>
<h2>YÖKDİL Hazırlık</h2><p>Devam etmek için şifrenizi girin</p>
<input class="login-input" id="loginPw" type="password" placeholder="Şifre" autofocus onkeydown="if(event.key==='Enter')doLogin()">
<button class="login-btn" onclick="doLogin()">Giriş Yap</button>
<div class="login-err" id="loginErr"></div></div></div>
<div id="root"></div>
<script>
const _PH="de1af9ebf31ce5671f9b68766c787550a07750479adbfb77f301968c51a59659";
async function _hash(s){const e=new TextEncoder().encode(s);const h=await crypto.subtle.digest('SHA-256',e);return Array.from(new Uint8Array(h)).map(b=>b.toString(16).padStart(2,'0')).join('')}
async function doLogin(){const pw=document.getElementById('loginPw').value;if(!pw)return;if(await _hash(pw)===_PH){localStorage.setItem('ykprep_auth','1');document.getElementById('loginOverlay').style.display='none'}else{document.getElementById('loginErr').textContent='Şifre yanlış.';document.getElementById('loginPw').value='';document.getElementById('loginPw').focus()}}
if(localStorage.getItem('ykprep_auth')==='1')document.addEventListener('DOMContentLoaded',()=>{const o=document.getElementById('loginOverlay');if(o)o.style.display='none'});

const D={"grammar_rules": [{"id": "g1", "title": "IN TERMS OF Kullanımı", "desc": "Açısından, bakımından anlamına gelir. explain, identify, describe fiilleriyle sık kullanılır.", "pattern": "... in terms of ...", "examCount": 8, "examples": ["The crimes of the rich can be explained in terms of the same motives as any other criminal act.", "Some differences have been identified in terms of the types and frequency of bullying."]}, {"id": "g2", "title": "Soyut İsim + TO + Fiil", "desc": "ability to, attempt to, chance to, responsibility to, means to, ways to gibi yapılar.", "pattern": "Abstract Noun + TO + Verb", "examCount": 8, "examples": ["Big social media companies have a responsibility to take every possible action.", "Smartphones do not have the ability to compete with desktop computers."]}, {"id": "g3", "title": "PREVIOUSLY + Verb3", "desc": "Önceden anlamına gelen previously, past participle (V3) ile kullanılır.", "pattern": "previously + V3 (discovered, thought...)", "examCount": 2, "examples": ["Wall paintings previously discovered in three Spanish caves have now been dated to 65,000 years ago.", "A given level of CO₂ produces less warming than previously thought."]}, {"id": "g4", "title": "ALSO Kullanımı (Destekleme + Zıtlık)", "desc": "Also hem destekleme (besides, in addition to) hem zıtlık bağlaçlarıyla (although, while, but) kullanılır.", "pattern": "Besides/Although... also...", "examCount": 12, "examples": ["Besides drawing on information from large sites, archaeologists must also rely on data from smaller sites.", "Although acupuncture is the most widely used technique, it also makes use of other methods."]}, {"id": "g7", "title": "Çürütme Zıtlık Soru Kurgusu", "desc": "Bir düşünce ortaya atılır, ardından however/but/although ile çürütülür veya sınırlandırılır.", "pattern": "Claim + However/But/Although + Refutation", "examCount": 6, "examples": ["Although the theory was widely accepted, recent studies have refuted its main premise.", "The policy was expected to reduce costs; however, it led to unexpected expenses."]}, {"id": "g8", "title": "UNLIKE Karşılaştırma Kurgusu", "desc": "Unlike + isim yapısıyla iki durum karşılaştırılır.", "pattern": "Unlike + Noun, Subject + Verb...", "examCount": 4, "examples": ["Unlike its predecessor, the new policy focused on long-term sustainability.", "Unlike traditional methods, modern approaches emphasize data-driven decisions."]}, {"id": "g9", "title": "Önemli/Gerekli Sıfatları + Sebep-Sonuç", "desc": "essential, crucial, vital, necessary gibi sıfatlar sebep-sonuç yapısında kullanılır.", "pattern": "It is essential/crucial/vital to/that...", "examCount": 5, "examples": ["It is essential that governments invest in renewable energy.", "Financial literacy is crucial for making informed decisions."]}, {"id": "g10", "title": "Belirsiz Durum vs Bilinen Durum", "desc": "Despite/Although + uncertainty, ... is widely known/accepted yapısı.", "pattern": "Although ... uncertain, ... is widely known/accepted", "examCount": 4, "examples": ["Although the exact cause remains unclear, the disease is widely associated with genetic factors.", "Despite ongoing debates, most scholars agree that climate change is human-induced."]}, {"id": "g12", "title": "SO + Sıfat + THAT / SUCH + Tamlama + THAT", "desc": "O kadar ... ki anlamında sonuç cümleleri kurar.", "pattern": "so + adj + that / such + noun phrase + that", "examCount": 6, "examples": ["The problem was so severe that immediate action was required.", "It was such a significant discovery that it changed the entire field."]}, {"id": "g13", "title": "NOT ONLY / BUT ALSO", "desc": "Sadece ... değil, aynı zamanda ... da anlamında. En çok sorulan ikili yapı.", "pattern": "Not only + auxiliary + S + V, but S + also + V", "examCount": 8, "examples": ["Not only did the reform improve education, but it also reduced inequality.", "The study not only confirmed the hypothesis but also revealed new patterns."]}, {"id": "g14", "title": "ALTHOUGH — En Çok Sorulan Bağlaç", "desc": "Rağmen anlamında. YDS/YÖKDİL tarihinin en çok sorulan bağlacı. although/though/even though/while ile kullanılır.", "pattern": "Although + S + V, S + V", "examCount": 20, "examples": ["Although the policy was widely criticized, it achieved its primary objective.", "Even though career assessment has targeted high school students, experts believe it benefits younger students too."]}, {"id": "g15", "title": "Derece Sıfatları + TO Kullanımı", "desc": "superior to, inferior to, prior to, subsequent to yapıları.", "pattern": "Comparative adj + TO (not THAN)", "examCount": 4, "examples": ["This method is superior to the traditional approach.", "Prior to the reform, the system was highly inefficient."]}, {"id": "g16", "title": "Relative Clause Soruları", "desc": "who, which, that, where, whose ile sıfat cümlecikleri. YÖKDİL'de sıkça sorulur.", "pattern": "Noun + who/which/that/where/whose + clause", "examCount": 10, "examples": ["The scientist who discovered the vaccine was awarded the Nobel Prize.", "The country where the study was conducted has a diverse population."]}, {"id": "g17", "title": "Present Perfect Tense — En Çok Sorulan Zaman", "desc": "have/has + V3. Geçmişte başlayıp hâlâ devam eden ya da etkisi süren durumlar.", "pattern": "S + have/has + V3 (since/for/recently/over the years)", "examCount": 15, "examples": ["Scientists have discovered that certain chemicals may play a role in Alzheimer's.", "The prevalence of food allergy appears to have risen sharply over the last 20 years."]}, {"id": "g19", "title": "THUS + Ving Kullanımı", "desc": "Bu şekilde, böylece anlamında. Sonuç bildiren yapı.", "pattern": "..., thus + Ving", "examCount": 3, "examples": ["The company reduced costs, thus increasing its profit margin.", "New regulations were introduced, thus preventing further environmental damage."]}, {"id": "g20a", "title": "Başlamak/Ortaya Çıkmak Fiilleri + V2", "desc": "begin, start, emerge, originate fiilleri genellikle Past Tense (V2) ile kullanılır.", "pattern": "began to / started to / emerged / originated", "examCount": 8, "examples": ["In the age of steam, engineers began to find more applications for the steam engine.", "By 2.5 million years ago, early humans began to make stone tools."]}, {"id": "g20b", "title": "Olasılık Modalleri", "desc": "can, could, may, might ile gelecekte olası durumlar. ..ebilir anlamında.", "pattern": "S + can/could/may/might + V1", "examCount": 15, "examples": ["Green teas could play a part in fighting Alzheimer's disease.", "Low-fat yogurt can be very high in added sugar."]}, {"id": "g21", "title": "Past Tense — 2. En Çok Sorulan Zaman", "desc": "V2 / was-were + V3. Geçmişte tamamlanmış olaylar.", "pattern": "S + V2 / S + was/were + V3", "examCount": 12, "examples": ["The physics of elementary particles was distinguished by the observation of particles.", "At the end of WWI, the leaders tried to decide what penalties Germany would pay."]}, {"id": "g23", "title": "BECAUSE Çeviri Soru Kurgusu", "desc": "Çeviri sorularında because/since/as sebep bağlaçlarıyla although zıtlık bağlacının karıştırılması.", "pattern": "Although vs Because/Since/As in translations", "examCount": 10, "examples": ["Although sunburn is not serious in the short term, skin cancer from overexposure is a growing problem.", "Because the intestines also provide enzymes, the pancreas is still the major source."]}, {"id": "g25", "title": "THE + İsim + OF Tamlama (Çeviri)", "desc": "the deterioration of, the prevalence of, the establishment of gibi tamlamalar çeviri sorularında sık çıkar.", "pattern": "The + Noun + of + Noun", "examCount": 18, "examples": ["The defeat of the Byzantine army started a period of military decline.", "The promotion of a laid-back lifestyle of peace and love was at the heart of the hippie movement."]}], "questions": [{"id": "q1", "type": "grammar", "subtype": "conjunction", "year": "2023 YÖKDİL Sosyal", "stem": "------ drawing on information from large archaeological sites raining and education in the mid-19th century, until when the apprenticeship model of training was dominant.", "Were it not for the formalisation of dentistry training and education, the training of dentistry would still be dominated by the apprenticeship model."], "answer": 3, "rule": "g25", "explanation": "'derneklerin kurulması' = The formation of dental societies. THE+İSİM+OF tamlama. D yapıyı doğru verir."}, {"id": "eq17", "type": "translation", "subtype": "tr2en", "year": "2023 YÖKDİL Sağlık", "stem": "Kalp krizinin en yaygın sebebi, genellikle kanın kalbe akışını engelleyen kan pıhtısından dolayı koroner atardamarın tıkanmasıdır.", "options": ["The most common cause of heart attack is a blockage of the coronary arteries, usually due to a blood clot, that disrupts the flow of blood to the heart.", "The most common heart attacks are usually caused by a blockage of the coronary arteries and a blood clot that disrupts the flow of blood to the heart.", "A blockage of the coronary arteries, usually with a blood clot, that may disrupt the flow of blood to the heart is one of the most common causes of heart attack.", "A blood clot that usually disrupts the flow of blood to the heart causes a blockage of the coronary arteries, which is considered to be the most common cause of heart attack.", "Heart attack usually occurs when the coronary arteries are blocked with a blood clot, disrupting the flow of blood to the heart."], "answer": 0, "rule": "g25", "explanation": "'en yaygın sebebi' = The most common cause of. A seçeneği yapı ve anlam olarak doğru."}, {"id": "eq18", "type": "grammar", "subtype": "sentence_completion", "year": "2024 YDS", "stem": "While infants are capable of feeling emotions such as distress and disgust at birth, --------.", "options": ["parents play an important role in the emotional development of their children", "complex emotions like embarrassment and guilt are proposed to emerge after the development of self-awareness around the age of 2", "re emic, many countries have made wearing face masks -------- in public spaces in order to slow the spread of the virus.", "options": ["compulsory", "crucial", "appropriate", "comprehensive"], "answer": 0, "explanation": "Compulsory = zorunlu. Virüsün yayılmasını yavaşlatmak için, devam eden salgından dolayı birçok ülke halka açık yerlerde ma"}, {"id": "hfb40", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "The view of the sunset from the mountaintop was truly -------- with vibrant colors of the sky.", "options": ["fundamental", "magnificient", "dire", "viable"], "answer": 1, "explanation": "Magnificient = muhteşem, harika. Dağın tepesinden gün batımı manzarası, gökyüzünün parlak renkleriyle gerçekten muhteşemdi."}, {"id": "hfb41", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "The international oil markets have been highly -------- since RussiaUkraine war.", "options": ["common", "futile", "novel", "volatile"], "answer": 3, "explanation": "Volatile = değişken, dalgalı. Uluslararası petrol piyasaları Rusya-Ukrayna savaşından beri oldukça değişkendir."}, {"id": "hfb42", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "The athlete underwent a -------- physical examination before the competition, including blood tests, bone scans and cardivascular assessments.", "options": ["volatile", "comprehensive", "ostentatious", "severe"], "answer": 1, "explanation": "Comprehensive = kapsamlı, detaylı. Atlet, yarışmadan önce kan testi, kemik taramaları ve kalp damar değerlendirmeleri dahil, kapsamlı b"}, {"id": "hfb43", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "The factory workers wear protective gear to protect themselves from the -------- substances they are working with.", "options": ["volatile", "profitable", "hazardous", "indispensable"], "answer": 2, "explanation": "Hazardous = tehlikeli, riskli, zararlı. Fabrika işçileri, çalıştıkları tehlikeli maddelerden kendilerini korumak için koruyucu teçhizat giye"}, {"id": "hfb44", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "The influence of ancient Greek civilisation, art and architecture, which were passed on by the Romans, is still -------- all around us.", "options": ["adverse", "dire", "prevalent", "visible"], "answer": 3, "explanation": "Visible = gözle görülür, belli, görünür. Romalılar tarafından günümüze gelen Antik Yunan Medeniyetinin, sanatının ve mimarisinin etkisi hâlâ "}, {"id": "hfb45", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "Even though there is sufficient water -------- to cover the demands of the world population, there is a shortage of clean water due to increased pollution.", "options": ["common", "priceless", "available", "beneficial"], "answer": 2, "explanation": "Available = mevcut, elde hazır bulunan, kullanılabilir. Dünya nüfusunun taleplerini karşılamak için mevcut yeterli su olmasına rağmen, artan kirlilikten dol"}, {"id": "hfb46", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "Despite the violent storm, the house remained -------- with no damage to the foundation or roof.", "options": ["intact", "sufficient", "beneficial", "adverse"], "answer": 0, "explanation": "Intact = sağlam, bozulmamış, el değmemiş. Şiddetli fırtınaya rağmen ev temeline ya da çatısına hiç zarar görmeden sağlam kaldı."}, {"id": "hfb47", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "Cognitive and behavioural changes after a stroke are common yet often overlooked because their effects may be --------.", "options": ["detrimental", "unprecedented", "subtle", "deliberate"], "answer": 2, "explanation": "Subtle = hemen göze çarpmayan, güç algılanan. Felç ardından bilişsel ve davranışsal değişimler yaygındır ama sıklıkla göz ardı edilir, çünkü etkil"}, {"id": "hfb48", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "There are a growing body of -------- evidence that the climate change is induced by human activities.", "options": ["probable", "available", "tangible", "severe"], "answer": 2, "explanation": "Tangible = somut. İklim değişikliğinin insan faaliyetlerinden kaynaklandığına dair artan sayıda somut kanıt vardır."}, {"id": "hfb49", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "Switzerland is -------- for its mesmerizing alpine scenery, luxury branded watches and deliciously milky chocolate.", "options": ["diverse", "priceless", "appropriate", "renowned"], "answer": 3, "explanation": "Renowned = ünlü. İsviçre büyüleyici alp manzarası, lüks marka saatleri ve lezzetli sütlü çikolatasıyla ünlüdür."}, {"id": "hfb50", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "The flu is a highly -------- viral infection that can easily spread from person to person.", "options": ["deliberate", "worthless", "tangible", "contagious"], "answer": 3, "explanation": "Contagious = bulaşıcı. Grip insandan insana kolaylıkla yayılabilen oldukça bulaşıcı viral bir enfeksiyondur."}, {"id": "hfb51", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "The use of typewriters for documentation has become -------- and has been replaced with computers and other digital devices.", "options": ["considerable", "scarce", "obsolete", "futile"], "answer": 2, "explanation": "Obsolete = modası geçmiş, eski moda. Belgeleme için daktilonun kullanımının modası geçti ve yerini bilgisayarlar ve diğer dijital cihazla"}, {"id": "hfb52", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "Taking vitamin supplements can be -------- in maintaining a balanced diet and supporting the body’s immune system.", "options": ["superficial", "beneficial", "viable", "inhospitable"], "answer": 1, "explanation": "Beneficial = faydalı, yararlı. Vitamin takviyeleri almak dengeli beslenmeyi sürdürmede ve vücudun bağışıklık sistemini desteklemede"}, {"id": "hfb53", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "When the company’s expenses suddenly increased, they became -------- and conducted thorough investigation.", "options": ["suspicious", "superficial", "imminent", "unprecedented"], "answer": 0, "explanation": "Suspicious = şüpheli, kuşkulu. Şirketin harcamamaları aniden artınca, şüphelendiler ve kapsamlı bir inceleme yürüttüler."}, {"id": "hfb54", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "The politician’s -------- actions led to the collapse of the economy, causing widespread harm to the citizens.", "options": ["deliberate", "intact", "imminent", "severe"], "answer": 0, "explanation": "Deliberate = kasıtlı, kasti. Politikacının kasıtlı eylemleri ekonominin çökmesine sebep oldu, ki bu ülke genelinde vatandaşlara z"}, {"id": "hfb55", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "The company is facing a -------- financial situation and may have to declare bankruptcy.", "options": ["available", "reciprocal", "dire", "excessive"], "answer": 2, "explanation": "Dire = vahim, berbat, korkunç. Şirket kötü bir finansal durumla karşılaşıyor ve iflasını duyurmak zorunda kalabilir."}, {"id": "hfb56", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "The company is hiring female workers to balance the -------- number of male employees in its workforce.", "options": ["counterfeit", "common", "disproportionate", "priceless"], "answer": 2, "explanation": "Disproportionate = orantısız. Şirket işgücünde orantısız sayıda erkek işçiyi dengelemek için kadın işçileri işe alıyor."}, {"id": "hfb57", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "Robots are very --------, and can be programmed to perform different tasks in the manufacturing process.", "options": ["versatile", "apparent", "promising", "prevalent"], "answer": 0, "explanation": "Versatile = çok yönlü, çok amaçlı, elinden her iş gelen. Robotlar çok amaçlı olabilir ve üretim sürecinde farklı görevleri yapmaya programlanabilirler."}, {"id": "hfb58", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "As some people produce irresistibly scented sweat that insects can detect from 30 m away, they are especially -------- for mosquitoes.", "options": ["volatile", "excessive", "persuasive", "appealing"], "answer": 3, "explanation": "Appealing = çekici, cezbedici. Bazı insanlar, sineklerin 30 metreden tespit edebileceği karşı konulamaz şekilde kokulu bir ter üret"}, {"id": "hfb59", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "Antibiotic-resistant bacteria are on the rise. Drugs that once conquered these deadly bacteria are now --------.", "options": ["worthless", "persuasive", "sufficient", "futile"], "answer": 0, "explanation": "Worthless = değersiz. Antibiyotik dirençli bakteriler artışta. Bir zamanlar bu ölümcül hastalıkları yenen ilaçlar şu an de"}, {"id": "hfb60", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "The -------- technology used by our ancestors to hunt and gather food was different from what we have today.", "options": ["counterfeit", "vague", "primitive", "affordable"], "answer": 2, "explanation": "Primitive = ilkel, basit, eski. Atalarımız tarafından avlanma ve yiyecek toplamak için kullanılan ilkel teknoloji bugün sahip olduğu"}, {"id": "hfb61", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "Although Thomas Edison was not the first to create the light bulb, his model was more commercially --------.", "options": ["viable", "controversial", "sufficient", "scarce"], "answer": 0, "explanation": "Viable = uygulanabilir. Thomas Edison ampülü icat eden ilk kişi olmamasına rağmen, onun modeli ticari olarak daha uygulanabi"}, {"id": "hfb62", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "The doctor examined the patient’s wound and concluded that it was only -------- as it had not affected the underlying tissues.", "options": ["visible", "superficial", "suspicious", "contagious"], "answer": 1, "explanation": "Superficial = yüzeysel, üstünkörü. Doktor hastanın yarasını muayene etti ve sadece yüzeysel olduğu sonucuna vardı çünkü alttaki dokular"}, {"id": "hfb63", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "The website was experiencing -------- connectivity issues, which made it frustrating for users trying to access it.", "options": ["intermittent", "impartial", "visible", "tangible"], "answer": 0, "explanation": "Intermittent = aralıklı, kesikli. Website aralıklı bağlantı sorunları yaşıyordu, ki bu ona erişmeye çalışan kullanıcıların canı sıkmış"}, {"id": "hfb64", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "The two countries signed a -------- trade agreement that would benefit each other’s economies.", "options": ["excessive", "reciprocal", "considerable", "crucial"], "answer": 1, "explanation": "Reciprocal = karşılıklı, iki taraflı. İki ülke, her iki ülkenin ekonomisinin faydalanacağı karşılıklı bir ticaret antlaşması imzaladı."}, {"id": "hfb65", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "His -------- display of wealth with his luxurious cars and clother made him unpopular among his peers.", "options": ["vigorous", "viable", "ostentatious", "versatile"], "answer": 2, "explanation": "Ostentatious = gösterişli, şatafatlı. Lüks araba ve kıyafetleriyle zenginliğini gösterişli bir şekilde sergilemesi arkadaşları arasında on"}, {"id": "hfb66", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "If we are to be successful in conserving Earth's biological diversity, -------- efforts immediately should be put in place to reduce the emissions of greenhouse gases.", "options": ["vigorous", "compulsory", "affordable", "disproportionate"], "answer": 0, "explanation": "Vigorous = enerjik, yoğun, sert, ağır, ateşli. Eğer dünyanın biyolojik çeşitliliğini korumada başarılı olmak istiyorsak sera gazı emisyonunu azaltm"}, {"id": "hfb67", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "The town was -------- during the heyday of mining industry with jobs and opportunities abundant for all.", "options": ["vague", "prosperous", "priceless", "intermittent"], "answer": 1, "explanation": "Prosperous = zengin, refahlı, müreffeh. Kasaba iş ve fırsatların herkes için bol olmasıyla madenciliğin en iyi günlerinde zengindi."}, {"id": "hfb68", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "The rescue team’s mission to save the stranded animals on the island was deemed -------- due to unfavourable weather conditions.", "options": ["probable", "impartial", "visible", "futile"], "answer": 3, "explanation": "Futile = boşa, nafile, beyhude. Kurtarma ekibinin mahsur kalmış hayvanları kurtarma görevi olumsuz hava koşullarından dolayı beyhude"}, {"id": "hfb69", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "The -------- health care plan provided by the government has benefitted millions of people.", "options": ["unprecedented", "affordable", "disproportionate", "primitive"], "answer": 1, "explanation": "Affordable = maddi güç yetebilir, bütçeye uygun. Hükümet tarafından sağlanan maddi güç yetebilir sağlık bakım planı milyonlarca insana fayda sağladı."}, {"id": "hfb70", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", "stem": "Due to his consistent poor performance, it is -------- that he will be fired from his job soon.", "options": ["abundant", "vast", "dire", "probable"], "answer": 3, "explanation": "Probable = olası, muhtemel. Süregelen yetersiz performansından dolayı yakında işinden kovulacak olması muhtemeldir."}, {"id": "hfb71", "type": "vocabulary", "subtype": "hedef_fill", "year": "HEDEF Sıfat", mar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- the study was conducted on a small sample, its findings have been widely cited in academic literature.", "options": ["Since", "As", "Even though", "Because"], "answer": 2, "explanation": "Çalışma küçük bir örneklemle yapılmış olsa da (Even though) bulguları yaygın şekilde atıf aldı."}, {"id": "ct7", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- being a major tourist destination, Istanbul is also one of the most important financial centers in the region.", "options": ["Rather than", "Instead of", "Besides", "Unlike"], "answer": 2, "explanation": "Önemli bir turist destinasyonu olmanın yanı sıra (Besides) İstanbul aynı zamanda önemli bir finans merkezi → also."}, {"id": "ct8", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "The initial results of the experiment were promising. --------, further research revealed significant limitations in the methodology.", "options": ["Therefore", "Moreover", "However", "Furthermore"], "answer": 2, "explanation": "İlk sonuçlar umut vericiydi. Ancak (However) daha fazla araştırma metodolojide önemli sınırlamalar ortaya çıkardı."}, {"id": "ct9", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "The region experienced severe drought for three consecutive years. --------, agricultural output declined significantly.", "options": ["On the other hand", "However", "Nevertheless", "Therefore"], "answer": 3, "explanation": "Bölge üç yıl üst üste ciddi kuraklık yaşadı. Bu nedenle (Therefore) tarımsal üretim önemli ölçüde düştü."}, {"id": "ct10", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "The new policy reduced carbon emissions by 15%. --------, it created thousands of green jobs in the renewable energy sector.", "options": ["On the contrary", "Nevertheless", "Moreover", "However"], "answer": 2, "explanation": "Yeni politika karbon emisyonlarını %15 azalttı. Üstelik (Moreover) yenilenebilir enerji sektöründe binlerce iş yarattı."}, {"id": "ct11", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "The government invested heavily in infrastructure development. --------, many rural areas still lack access to basic services.", "options": ["Furthermore", "Therefore", "Moreover", "Nevertheless"], "answer": 3, "explanation": "Hükümet altyapıya yoğun yatırım yaptı. Buna rağmen (Nevertheless) birçok kırsal bölge temel hizmetlerden yoksun."}, {"id": "ct12", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- the optimistic predictions of economists, the GDP growth rate fell below expectations in the third quarter.", "options": ["In addition to", "Along with", "In contrast to", "Together with"], "answer": 2, "explanation": "Ekonomistlerin iyimser tahminlerinin aksine (In contrast to) GSYİH büyüme oranı beklentilerin altında kaldı."}, {"id": "ct13", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "The project can be completed within the scheduled timeframe -------- adequate funding is secured from international donors.", "options": ["Although", "Despite the fact that", "Provided that", "Even though"], "answer": 2, "explanation": "Uluslararası bağışçılardan yeterli fon sağlanması koşuluyla (Provided that) proje zamanında tamamlanabilir."}, {"id": "ct14", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- developed countries have aging populations, many developing nations face challenges related to rapid population growth.", "options": ["Furthermore", "Moreover", "In addition", "Whereas"], "answer": 3, "explanation": "Gelişmiş ülkelerde nüfus yaşlanırken (Whereas) gelişmekte olan birçok ülke hızlı nüfus artışı sorunuyla karşı karşıya."}, {"id": "ct15", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "Economic growth can be sustained -------- governments maintain fiscal discipline and invest in human capital.", "options": ["Even though", "Despite", "As long as", "Although"], "answer": 2, "explanation": "Hükümetler mali disiplini sürdürdüğü ve insan sermayesine yatırım yaptığı sürece (As long as) büyüme sürdürülebilir."}, {"id": "ct16", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "Globalization has brought economic benefits to many developing countries. --------, it has also led to cultural homogenization and loss of local traditions.", "options": ["Therefore", "Consequently", "On the other hand", "As a result"], "answer": 2, "explanation": "Küreselleşme ekonomik faydalar getirdi. Öte yandan (On the other hand) kültürel homojenleşmeye de yol açtı."}, {"id": "ct17", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- widespread criticism from environmental groups, the government approved the construction of a new coal power plant.", "options": ["Because of", "Thanks to", "As a result of", "In spite of"], "answer": 3, "explanation": "Çevre gruplarından gelen yaygın eleştirilere rağmen (In spite of) hükümet yeni bir kömür santralini onayladı."}, {"id": "ct18", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "The central bank raised interest rates to combat rising inflation. --------, consumer spending decreased sharply in the following months.", "options": ["Consequently", "However", "Nevertheless", "On the contrary"], "answer": 0, "explanation": "Merkez bankası enflasyonla mücadele için faiz artırdı. Sonuç olarak (Consequently) tüketici harcamaları keskin düştü."}, {"id": "ct19", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "The endangered species will face extinction -------- immediate conservation measures are implemented to protect their natural habitats.", "options": ["Even though", "Unless", "While", "Although"], "answer": 1, "explanation": "Doğal yaşam alanlarını korumak için acil koruma önlemleri uygulanmadıkça (Unless) nesli tükenmekle yüz yüze."}, {"id": "ct20", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- did the reform improve access to healthcare, but it also reduced the financial burden on low-income families.", "options": ["Whether", "Although", "Unless", "Not only"], "answer": 3, "explanation": "Reform sadece sağlık hizmetlerine erişimi iyileştirmekle kalmadı (Not only), aynı zamanda düşük gelirli ailelerin mali yükünü de azalttı."}, {"id": "ct21", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "The government increased funding for public schools -------- every child could receive a quality education regardless of their background.", "options": ["Although", "Unless", "Even though", "So that"], "answer": 3, "explanation": "Her çocuğun kaliteli eğitim alabilmesi için (So that) hükümet devlet okullarına verilen fonları artırdı."}, {"id": "ct22", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- relying solely on traditional teaching methods, modern educators are increasingly incorporating technology into their classrooms.", "options": ["Besides", "In addition to", "Rather than", "As well as"], "answer": 2, "explanation": "Sadece geleneksel öğretim yöntemlerine güvenmek yerine (Rather than) modern eğitimciler teknolojiyi dahil ediyor."}, {"id": "ct23", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- advances in medical technology, the average life expectancy has increased significantly over the past century.", "options": ["As a result of", "Despite", "In spite of", "Regardless of"], "answer": 0, "explanation": "Tıp teknolojisindeki gelişmeler sonucunda (As a result of) ortalama yaşam süresi önemli ölçüde arttı."}, {"id": "ct24", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- popular belief, the Great Wall of China is not visible from space with the naked eye.", "options": ["According to", "Similar to", "In line with", "Contrary to"], "answer": 3, "explanation": "Yaygın inanışın aksine (Contrary to) Çin Seddi uzaydan çıplak gözle görülemez."}, {"id": "tt0", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "Since the discovery of penicillin, antibiotics ---- millions of lives worldwide.", "options": ["saved", "had saved", "have saved", "were saving"], "answer": 2, "explanation": "Since + Present Perfect: keşiften bu yana milyonlarca hayat kurtardı (have saved)."}, {"id": "tt1", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "By the time the rescue team ----, the flood waters had already receded.", "options": ["was arriving", "arrived", "arrives", "has arrived"], "answer": 1, "explanation": "By the time + Past Simple. Had already receded (Past Perfect) önceki olay."}, {"id": "tt2", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "The Roman Empire ---- for nearly five centuries before its collapse in 476 AD.", "options": ["was existing", "had existed", "existed", "has existed"], "answer": 1, "explanation": "Before + past event → Past Perfect (had existed). 476'dan ÖNCE beş yüzyıl var olmuştu."}, {"id": "tt3", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "Over the past decade, renewable energy sources ---- an increasingly important role in global electricity generation.", "options": ["have played", "had played", "were playing", "played"], "answer": 0, "explanation": "Over the past decade → Present Perfect (have played). Son on yılda artan önem."}, {"id": "tt4", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "When the Industrial Revolution ---- in Britain in the late 18th century, it transformed the country's economy forever.", "options": ["has begun", "was beginning", "had begun", "began"], "answer": 3, "explanation": "When + geçmiş olay → Past Simple (began). 18. yüzyıl sonunda başladı."}, {"id": "tt5", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "Researchers ---- that regular exercise can significantly reduce the risk of cardiovascular disease.", "options": ["found", "had found", "have found", "are finding"], "answer": 2, "explanation": "Genel geçer bulgu → have found (Present Perfect) veya find. Devam eden etki."}, {"id": "tt6", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "The ancient Egyptians ---- sophisticated irrigation systems thousands of years ago.", "options": ["have developed", "were developing", "had developed", "developed"], "answer": 3, "explanation": "Thousands of years ago → Past Simple (developed). Belirli geçmiş zaman."}, {"id": "tt7", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "Global temperatures ---- steadily since the beginning of the industrial era.", "options": ["are rising", "rose", "had risen", "have been rising"], "answer": 3, "explanation": "Since → Present Perfect Continuous (have been rising). O zamandan beri sürekli yükseliyor."}, {"id": "tt8", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "The committee ---- the report before the deadline, so the project could proceed as planned.", "options": ["had completed", "has completed", "completed", "was completing"], "answer": 0, "explanation": "Before + Past event → Past Perfect (had completed). Teslim tarihinden ÖNCE tamamlamıştı."}, {"id": "tt9", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "Today, approximately 7,000 languages ---- around the world, though many of them are endangered.", "options": ["were spoken", "had been spoken", "have been spoken", "are spoken"], "answer": 3, "explanation": "Today → Present Simple Passive (are spoken). Bugün dünyada konuşulur."}, {"id": "tt10", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "The city of Pompeii ---- by volcanic ash when Mount Vesuvius erupted in 79 AD.", "options": ["had been buried", "has been buried", "is buried", "was buried"], "answer": 3, "explanation": "79 AD belirli geçmiş → Past Simple Passive (was buried)."}, {"id": "tt11", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "Scientists predict that sea levels ---- significantly by the end of this century.", "options": ["will have risen", "have risen", "rise", "will rise"], "answer": 0, "explanation": "By the end of this century → Future Perfect (will have risen). O zamana kadar yükselmiş olacak."}, {"id": "tt12", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "The ancient Greeks ---- a major contribution to Western philosophy and science.", "options": ["have made", "made", "had made", "were making"], "answer": 1, "explanation": "Tamamlanmış tarihsel olay → Past Simple (made)."}, {"id": "tt13", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "Up to now, no effective treatment ---- for this rare genetic disorder.", "options": ["had been found", "was found", "is found", "has been found"], "answer": 3, "explanation": "Up to now → Present Perfect Passive (has been found). Şimdiye kadar bulunamamıştır."}, {"id": "tt14", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "While the population of the city ---- rapidly, the infrastructure failed to keep pace with the growth.", "options": ["had grown", "was growing", "grew", "has grown"], "answer": 1, "explanation": "While + Past Continuous (was growing). Nüfus artarken altyapı yetişemedi."}, {"id": "tt15", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "The discovery of DNA structure in 1953 ---- the foundation for modern genetics.", "options": ["had laid", "was laying", "has laid", "laid"], "answer": 3, "explanation": "1953 → Past Simple (laid). Belirli tarih, geçmiş olay."}, {"id": "tt16", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "The number of people living in urban areas ---- dramatically since the 1950s.", "options": ["has increased", "increases", "increased", "had increased"], "answer": 0, "explanation": "Since the 1950s → Present Perfect (has increased). 1950'lerden bu yana arttı."}, {"id": "tt17", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "By 2050, experts estimate that two-thirds of the world's population ---- in cities.", "options": ["are living", "live", "will be living", "will live"], "answer": 2, "explanation": "By 2050 → Future Continuous (will be living). O dönemde yaşıyor olacak."}, {"id": "tt18", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "Before the invention of the printing press, books ---- by hand, making them extremely expensive.", "options": ["were copied", "had been copied", "are copied", "have been copied"], "answer": 1, "explanation": "Before + past → Past Perfect Passive (had been copied). Matbaadan önce elle kopyalanmıştı."}, {"id": "tt19", "type": "grammar", "subtype": "tense_gen", "year": "Tense Çalışma", "stem": "The economic crisis that ---- in 2008 had devastating consequences for millions of people around the world.", "options": ["had occurred", "occurred", "has occurred", "occurs"], "answer": 1, "explanation": "2008'de → Past Simple (occurred). Belirli geçmiş tarih."}, {"id": "sc0", "type": "grammar", "subtype": "sentence_comp_gen", "year": "Cümle Tamamlama", "stem": "Although the internet has revolutionized access to information, --------.", "options": ["most people prefer using social media over traditional websites", "the first email was sent in the early 1970s", "concerns about misinformation and digital privacy have also grown significantly", "it was initially developed for military communication purposes"], "answer": 2, "explanation": "Although + olumlu → zıtlık: ama dezenformasyon/gizlilik kaygıları da arttı."}, {"id": "sc1", "type": "grammar", "subtype": "sentence_comp_gen", "year": "Cümle Tamamlama", "stem": "-------- , it has also been criticized for widening the gap between rich and poor nations.", "options": ["Since developing nations refuse to participate in global markets", "Given that poverty has been completely eliminated worldwide", "While globalization has brought economic benefits to many countries", "Because international trade has decreased in recent years"], "answer": 2, "explanation": "also + zıtlık → While/Although. Küreselleşme faydalar getirse de eleştirildi."}, {"id": "sc2", "type": "grammar", "subtype": "sentence_comp_gen", "year": "Cümle Tamamlama", "stem": "The preservation of cultural heritage is essential for maintaining national identity, --------.", "options": ["so all countries should invest equally in cultural programs", "as cultural festivals attract millions of visitors annually", "because tourism generates significant revenue for local economies", "yet many historical sites are threatened by rapid urbanization and climate change"], "answer": 3, "explanation": "yet ile zıtlık: önemli ama birçok tarihi alan kentleşme ve iklim değişikliğiyle tehdit altında."}, {"id": "sc3", "type": "grammar", "subtype": "sentence_comp_gen", "year": "Cümle Tamamlama", "stem": "-------- , many indigenous languages are at risk of disappearing within the next few decades.", "options": ["Because governments have successfully implemented bilingual education programs", "Since the number of language speakers has increased dramatically worldwide", "As translation technology has made all languages equally accessible", "Despite growing awareness of linguistic diversity and the importance of language preservation"], "answer": 3, "explanation": "Despite + olumlu → ama yerlı diller yok olma riskiyle karşı karşıya → zıtlık."}, {"id": "sc4", "type": "grammar", "subtype": "sentence_comp_gen", "year": "Cümle Tamamlama", "stem": "The study revealed that children who are exposed to music education at an early age --------.", "options": ["prefer listening to classical music over modern genres", "always become professional musicians in their adult lives", "have no interest in other academic subjects like science", "tend to perform better in mathematics and develop stronger problem-solving skills"], "answer": 3, "explanation": "Müzik eğitimine erken yaşta maruz kalan çocuklar matematikte daha başarılı olma eğiliminde."}, {"id": "sc5", "type": "grammar", "subtype": "sentence_comp_gen", "year": "Cümle Tamamlama", "stem": "-------- , the discovery fundamentally changed our understanding of the universe.", "options": ["Because all scientists immediately accepted the new theory", "Although it was met with skepticism by the scientific community at first", "Given that the findings were consistent with previous research", "Since the experiment had been conducted many times before"], "answer": 1, "explanation": "Although ile zıtlık: başta şüpheyle karşılansa da evren anlayışımızı temelden değiştirdi."}, {"id": "sc6", "type": "grammar", "subtype": "sentence_comp_gen", "year": "Cümle Tamamlama", "stem": "Urbanization has brought many advantages such as improved access to services; --------.", "options": ["moreover, every city in the world has successfully managed its growth", "however, it has also created problems like overcrowding, pollution, and inadequate housing", "therefore, all rural populations should move to cities immediately", "consequently, there are no disadvantages associated with urban living"], "answer": 1, "explanation": "however ile zıtlık: kentleşme avantajlar getirdi ancak aşırı kalabalık, kirlilik gibi sorunlar da yarattı."}, {"id": "sc7", "type": "grammar", "subtype": "sentence_comp_gen", "year": "Cümle Tamamlama", "stem": "The success of any educational reform depends not only on the quality of the curriculum --------.", "options": ["because textbooks are the only factor that determines academic achievement", "and it has nothing to do with government funding or resources", "so students should be entirely responsible for their own learning", "but also on the training and motivation of teachers who implement it"], "answer": 3, "explanation": "not only... but also: sadece müfredat kalitesine değil, aynı zamanda öğretmenlerin eğitim ve motivasyonuna da bağlı."}, {"id": "sc8", "type": "grammar", "subtype": "sentence_comp_gen", "year": "Cümle Tamamlama", "stem": "-------- , renewable energy technologies have become increasingly cost-competitive with fossil fuels.", "options": ["Because fossil fuels are becoming cheaper and more abundant", "Since most countries have banned the use of renewable energy sources", "Thanks to significant advances in solar and wind power over the past decade", "Although governments have stopped investing in clean energy research"], "answer": 2, "explanation": "Thanks to (sayesinde): güneş ve rüzgar enerjisindeki gelişmeler sayesinde yenilenebilir enerji rekabetçi hale geldi."}, {"id": "sc9", "type": "grammar", "subtype": "sentence_comp_gen", "year": "Cümle Tamamlama", "stem": "The ancient Silk Road was not merely a trade route; --------.", "options": ["it was also a conduit for the exchange of ideas, religions, and technologies between East and West", "it was exclusively used for transporting silk from China to Europe", "it connected only two cities and had no historical significance", "no one traveled along it after the fall of the Roman Empire"], "answer": 0, "explanation": "not merely... also: sadece ticaret yolu değil, aynı zamanda fikir, din ve teknoloji alışverişi kanalıydı."}, {"id": "trg0", "type": "translation", "subtype": "en2tr_gen", "year": "Çeviri Çalışma", "stem": "Although renewable energy sources are becoming more affordable, many developing countries still rely heavily on fossil fuels for their energy needs.", "options": ["Yenilenebilir enerji kaynakları daha uygun fiyatlı hale gelse de birçok gelişmekte olan ülke enerji ihtiyaçları için hâlâ büyük ölçüde fosil yakıtlara bağımlıdır.", "Gelişmekte olan ülkelerin enerji ihtiyaçlarını karşılamak için yenilenebilir enerji kaynaklarını kullanmaları zorunlu hale gelmiştir.", "Yenilenebilir enerji kaynakları gelişmekte olan ülkelerde uygun fiyatlı olduğu için fosil yakıtlar artık kullanılmamaktadır.", "Fosil yakıtlar ucuzladığı için gelişmekte olan ülkeler yenilenebilir enerji kaynaklarına geçiş yapmak zorunda kalmıştır."], "answer": 0, "explanation": "Doğru çeviri anahtar bağlaç ve yapıyı korumalıdır."}, {"id": "trg1", "type": "translation", "subtype": "en2tr_gen", "year": "Çeviri Çalışma", "stem": "Despite significant advances in medical research, a definitive cure for Alzheimer's disease has not yet been found.", "options": ["Tıbbi araştırmalar ilerleme kaydettiğinden Alzheimer hastalığının kesin tedavisi yakında bulunacaktır.", "Alzheimer hastalığı için bulunan kesin tedavi tıbbi araştırmalardaki önemli gelişmelerden biridir.", "Tıbbi araştırmalardaki önemli gelişmelere rağmen Alzheimer hastalığı için kesin bir tedavi henüz bulunamamıştır.", "Alzheimer hastalığının tedavisi bulunduğu için tıbbi araştırmalar artık bu alana odaklanmamaktadır."], "answer": 2, "explanation": "Doğru çeviri anahtar bağlaç ve yapıyı korumalıdır."}, {"id": "trg2", "type": "translation", "subtype": "en2tr_gen", "year": "Çeviri Çalışma", "stem": "While the Industrial Revolution brought unprecedented economic growth, it also resulted in severe environmental degradation and social inequality.", "options": ["Sanayi Devrimi benzeri görülmemiş bir ekonomik büyüme getirirken aynı zamanda ciddi çevre tahribatına ve sosyal eşitsizliğe de yol açmıştır.", "Sanayi Devrimi ekonomik büyümeye neden olmadı ancak çevre tahribatı ve sosyal eşitsizlik yarattı.", "Sanayi Devrimi'nin tek sonucu ekonomik büyüme olmuştur; çevresel ve sosyal etkiler ihmal edilebilir düzeydedir.", "Çevre tahribatı ve sosyal eşitsizlik Sanayi Devrimi'nden önce de var olan sorunlardı ve ekonomik büyümeyle ilgisi yoktu."], "answer": 0, "explanation": "Doğru çeviri anahtar bağlaç ve yapıyı korumalıdır."}, {"id": "trg3", "type": "translation", "subtype": "en2tr_gen", "year": "Çeviri Çalışma", "stem": "Not only has the population of the city doubled in the last two decades, but the demand for housing has also outpaced the supply significantly.", "options": ["Son yirmi yılda şehrin nüfusu yalnızca iki katına çıkmakla kalmamış, aynı zamanda konut talebi de arzı önemli ölçüde aşmıştır.", "Şehrin nüfusu son yirmi yılda sabit kalmış ancak konut arzı talebin çok üstüne çıkmıştır.", "Konut talebi son yirmi yılda düşmesine rağmen şehrin nüfusu iki katına çıkmıştır.", "Şehrin nüfusu ve konut talebi son yirmi yılda aynı oranda ve dengeli bir şekilde artmıştır."], "answer": 0, "explanation": "Doğru çeviri anahtar bağlaç ve yapıyı korumalıdır."}, {"id": "trg4", "type": "translation", "subtype": "en2tr_gen", "year": "Çeviri Çalışma", "stem": "Unless immediate action is taken to reduce carbon emissions, the consequences of climate change will become irreversible within the next few decades.", "options": ["İklim değişikliğinin sonuçları geri dönüşü olmaz hale geldiğinden karbon emisyonlarını azaltmak gereksiz hale gelmiştir.", "Karbon emisyonları azaltıldığı için iklim değişikliğinin sonuçları artık geri dönüşü olmaz hale gelmiştir.", "Karbon emisyonlarını azaltmak için acil önlem alınmadıkça iklim değişikliğinin sonuçları önümüzdeki birkaç on yıl içinde geri dönüşü olmaz hale gelecektir.", "Acil önlem alınması halinde bile karbon emisyonları artmaya devam edecek ve iklim değişikliği engellenemeyecektir."], "answer": 2, "explanation": "Doğru çeviri anahtar bağlaç ve yapıyı korumalıdır."}, {"id": "trg5", "type": "translation", "subtype": "en2tr_gen", "year": "Çeviri Çalışma", "stem": "The more diverse a society is, the greater the need for inclusive policies that ensure equal opportunities for all citizens.", "options": ["Kapsayıcı politikalar yalnızca homojen toplumlarda etkilidir ve çeşitli toplumlarda işe yaramaz.", "Çeşitli toplumlar kapsayıcı politikalara ihtiyaç duymaz çünkü vatandaşlar zaten eşit fırsatlara sahiptir.", "Toplumsal çeşitlilik azaldıkça kapsayıcı politikalara duyulan ihtiyaç artmaktadır.", "Bir toplum ne kadar çeşitli olursa tüm vatandaşlar için eşit fırsatlar sağlayan kapsayıcı politikalara o kadar fazla ihtiyaç duyulur."], "answer": 3, "explanation": "Doğru çeviri anahtar bağlaç ve yapıyı korumalıdır."}, {"id": "trg6", "type": "translation", "subtype": "en2tr_gen", "year": "Çeviri Çalışma", "stem": "Owing to the rapid advancement of artificial intelligence, many traditional jobs are expected to be automated in the coming years.", "options": ["Yapay zekâ yalnızca yeni işler yaratmaktadır ve geleneksel işleri etkilememektedir.", "Yapay zekâ ilerlemesine rağmen geleneksel işlerin otomatikleştirilmesi mümkün değildir.", "Yapay zekânın hızla ilerlemesi nedeniyle önümüzdeki yıllarda birçok geleneksel işin otomatikleştirılmesi beklenmektedir.", "Geleneksel işlerin otomatikleştirilmesi yapay zekânın gelişimini yavaşlatmıştır."], "answer": 2, "explanation": "Doğru çeviri anahtar bağlaç ve yapıyı korumalıdır."}, {"id": "trg7", "type": "translation", "subtype": "en2tr_gen", "year": "Çeviri Çalışma", "stem": "It is widely acknowledged that education plays a crucial role in reducing poverty and promoting social mobility.", "options": ["Eğitim yoksulluğu artırdığı ve sosyal hareketliliği engellediği için yaygın olarak eleştirilmektedir.", "Yoksulluğun azaltılması eğitimle değil yalnızca ekonomik politikalarla mümkündür.", "Eğitimin yoksulluğu azaltmada ve sosyal hareketliliği teşvik etmede çok önemli bir rol oynadığı yaygın olarak kabul edilmektedir.", "Sosyal hareketlilik yalnızca zengin ülkelerde görülen bir olgudur ve eğitimle ilgisi yoktur."], "answer": 2, "explanation": "Doğru çeviri anahtar bağlaç ve yapıyı korumalıdır."}, {"id": "cex0", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- the vaccine was developed in record time, public hesitancy slowed the immunization campaign significantly.", "options": ["Since", "As", "Because", "Although"], "answer": 3, "explanation": "Aşı rekor sürede geliştirilmiş olsa da (Although) halk tereddüdü aşılama kampanyasını yavaşlattı → zıtlık."}, {"id": "cex1", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- access to clean water has improved globally, millions of people in sub-Saharan Africa still lack safe drinking water.", "options": ["Even though", "As long as", "Since", "Because"], "answer": 0, "explanation": "Temiz suya erişim küresel olarak iyileşmiş olsa da (Even though) milyonlarca kişi hâlâ güvenli içme suyundan yoksun."}, {"id": "cex2", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- some historians view colonialism as a civilizing mission, most contemporary scholars recognize it as a system of exploitation.", "options": ["While", "Because", "Since", "As"], "answer": 0, "explanation": "Bazı tarihçiler sömürgeciliği medenileştirme görevi olarak görse de (While) çoğu çağdaş akademisyen sömürü sistemi olarak kabul eder."}, {"id": "cex3", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- artificial intelligence has the potential to revolutionize healthcare, ethical concerns about patient data privacy remain unresolved.", "options": ["Due to the fact that", "Since", "Although", "Because"], "answer": 2, "explanation": "Yapay zekâ sağlık hizmetlerinde devrim potansiyeline sahip olsa da (Although) hasta veri gizliliği sorunları çözümsüz."}, {"id": "cex4", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- decades of peace negotiations, the conflict in the region shows no signs of reaching a permanent resolution.", "options": ["Thanks to", "Due to", "Because of", "Despite"], "answer": 3, "explanation": "Onlarca yıllık barış müzakerelerine rağmen (Despite) bölgedeki çatışma kalıcı çözüme ulaşma belirtisi göstermiyor."}, {"id": "cex5", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- automation increases efficiency and reduces production costs, it also raises concerns about widespread unemployment in manufacturing sectors.", "options": ["Moreover", "Therefore", "While", "Furthermore"], "answer": 2, "explanation": "Otomasyon verimliliği artırır ve maliyetleri düşürürken (While) imalat sektörlerinde yaygın işsizlik kaygılarını da artırır."}, {"id": "cex6", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- the availability of effective vaccines, measles outbreaks continue to occur in communities with low vaccination rates.", "options": ["Because of", "As a result of", "In spite of", "Due to"], "answer": 2, "explanation": "Etkili aşıların mevcut olmasına rağmen (In spite of) düşük aşılama oranlarına sahip topluluklarda kızamık salgınları devam ediyor."}, {"id": "cex7", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "The country has made significant progress in reducing poverty over the past two decades. --------, income inequality remains a persistent challenge.", "options": ["Nevertheless", "Furthermore", "Therefore", "Moreover"], "answer": 0, "explanation": "Ülke yoksulluğu azaltmada önemli ilerleme kaydetti. Buna rağmen (Nevertheless) gelir eşitsizliği kalıcı bir sorun olmaya devam ediyor."}, {"id": "cex8", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "Traditional medicine has been practiced for thousands of years in many cultures. --------, its effectiveness has not always been validated through rigorous scientific research.", "options": ["Moreover", "However", "Furthermore", "In addition"], "answer": 1, "explanation": "Geleneksel tıp binlerce yıldır uygulanmaktadır. Ancak (However) etkinliği her zaman bilimsel araştırmalarla doğrulanmamıştır."}, {"id": "cex9", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- individualistic cultures emphasize personal achievement and autonomy, collectivistic cultures prioritize group harmony and social obligations.", "options": ["Similarly", "Moreover", "Whereas", "Furthermore"], "answer": 2, "explanation": "Bireyci kültürler kişisel başarı ve özerkliği vurgularken (Whereas) toplulukçu kültürler grup uyumuna öncelik verir."}, {"id": "cex10", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "The archaeological site yielded numerous artifacts dating back to the Bronze Age. --------, researchers discovered evidence of an advanced irrigation system.", "options": ["On the contrary", "Moreover", "However", "Nevertheless"], "answer": 1, "explanation": "Arkeolojik alan Tunç Çağı'na ait çok sayıda eser ortaya çıkardı. Üstelik (Moreover) gelişmiş bir sulama sisteminin kanıtları da keşfedildi."}, {"id": "cex11", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "Bilingual education has been shown to improve cognitive flexibility. --------, students in bilingual programs often outperform their monolingual peers in standardized tests.", "options": ["On the other hand", "However", "Furthermore", "Nevertheless"], "answer": 2, "explanation": "İki dilli eğitimin bilişsel esnekliği geliştirdiği gösterilmiştir. Ayrıca (Furthermore) iki dilli programlardaki öğrenciler standart testlerde daha başarılı."}, {"id": "cex12", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "The museum houses an impressive collection of Renaissance paintings. --------, it offers interactive exhibits designed specifically for younger visitors.", "options": ["In addition", "Nevertheless", "However", "On the contrary"], "answer": 0, "explanation": "Müze etkileyici bir Rönesans tablosu koleksiyonuna sahiptir. Buna ek olarak (In addition) genç ziyaretçiler için interaktif sergiler sunmaktadır."}, {"id": "cex13", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "The region's economy is heavily dependent on a single commodity — oil. --------, fluctuations in global oil prices have a disproportionate impact on its economic stability.", "options": ["On the other hand", "Nevertheless", "However", "Therefore"], "answer": 3, "explanation": "Bölge ekonomisi büyük ölçüde petrole bağımlıdır. Bu nedenle (Therefore) küresel petrol fiyatlarındaki dalgalanmalar orantısız etki yapar."}, {"id": "cex14", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "Deforestation disrupts the water cycle by reducing the amount of moisture released into the atmosphere. --------, rainfall patterns in affected regions become increasingly unpredictable.", "options": ["On the contrary", "However", "Nevertheless", "Consequently"], "answer": 3, "explanation": "Ormansızlaşma su döngüsünü bozar. Sonuç olarak (Consequently) etkilenen bölgelerdeki yağış düzenleri giderek daha öngörülemez hale gelir."}, {"id": "cex15", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "The invention of the printing press made books more widely available to the general public. --------, literacy rates across Europe began to rise dramatically.", "options": ["Thus", "However", "Nevertheless", "Conversely"], "answer": 0, "explanation": "Matbaanın icadı kitapları halka daha yaygın hale getirdi. Böylece (Thus) Avrupa'da okuryazarlık oranları hızla yükselmeye başladı."}, {"id": "cex16", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "The new trade agreement eliminated tariffs on agricultural products between the two countries. --------, cross-border trade in these goods increased by nearly 40 percent.", "options": ["As a result", "In spite of this", "Nevertheless", "On the contrary"], "answer": 0, "explanation": "Yeni ticaret anlaşması tarım ürünlerindeki gümrük vergilerini kaldırdı. Bunun sonucunda (As a result) sınır ötesi ticaret %40 arttı."}, {"id": "cex17", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "Endangered species will continue to face the threat of extinction -------- governments implement stricter conservation laws and enforce them effectively.", "options": ["Although", "While", "Even though", "Unless"], "answer": 3, "explanation": "Hükümetler daha sıkı koruma yasaları uygulamadıkça (Unless) nesli tükenmekte olan türler tehdit altında olmaya devam edecek."}, {"id": "cex18", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "Developing countries can achieve sustainable economic growth -------- they invest adequately in education and infrastructure.", "options": ["Despite the fact that", "Even though", "Provided that", "Although"], "answer": 2, "explanation": "Gelişmekte olan ülkeler eğitim ve altyapıya yeterli yatırım yapmaları koşuluyla (Provided that) sürdürülebilir büyüme sağlayabilir."}, {"id": "cex19", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "Democracy can function effectively -------- citizens are well-informed and actively participate in the political process.", "options": ["Even though", "As long as", "Although", "Despite"], "answer": 1, "explanation": "Vatandaşlar iyi bilgilendirilmiş ve siyasi sürece aktif katıldığı sürece (As long as) demokrasi etkin işleyebilir."}, {"id": "cex20", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- its European counterparts, which rely heavily on nuclear energy, Turkey generates most of its electricity from natural gas and hydropower.", "options": ["Like", "Similar to", "Unlike", "Just as"], "answer": 2, "explanation": "Nükleer enerjiye büyük ölçüde bağımlı olan Avrupalı muadillerinin aksine (Unlike) Türkiye elektriğini doğalgaz ve hidroelektrikten üretir."}, {"id": "cex21", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- the rapid economic growth of the 1990s, the first decade of the 2000s was marked by financial instability and recession.", "options": ["In contrast to", "In addition to", "Along with", "Together with"], "answer": 0, "explanation": "1990'ların hızlı ekonomik büyümesinin aksine (In contrast to) 2000'lerin ilk on yılı finansal istikrarsızlık ve durgunlukla geçti."}, {"id": "cex22", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- the widespread assumption that social media promotes democratic participation, recent studies suggest it may actually amplify polarization.", "options": ["Contrary to", "According to", "Consistent with", "In line with"], "answer": 0, "explanation": "Sosyal medyanın demokratik katılımı teşvik ettiği yaygın varsayımının aksine (Contrary to) son çalışmalar kutuplaşmayı artırabileceğini gösteriyor."}, {"id": "cex23", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "-------- address the growing housing crisis, the municipality introduced new zoning regulations that encourage the construction of affordable apartments.", "options": ["In order to", "In spite of", "Although", "Despite"], "answer": 0, "explanation": "Büyüyen konut krizini çözmek amacıyla (In order to) belediye uygun fiyatlı daire inşaatını teşvik eden yeni imar düzenlemeleri getirdi."}, {"id": "cex24", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalışma", "stem": "The government introduced bilingual education programs -------- minority groups could preserve their cultural heritage while integrating into mainstream society.", "options": ["Even though", "So that", "Although", "Despite"], "answer": 1, "explanation": "Azınlık gruplarının topluma entegre olurken kültürel miraslarını koruyabilmesi için (So that) hükümet iki dilli eğitim programları başlattı."}, {"id": "cex25", "type": "grammar", "subtype": "conjunction_gen", "year": "Bağlaç Çalı const today=()=>{const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')};

let view='home',subView=null,subId=null,qFilter='all',qDir='both';
let prog=LS.get('prog')||{};
